name: Deploy GA Editor to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "ga-consensus-editor/**"
      - ".github/workflows/deploy-ga-editor-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ga-consensus-editor
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_READ_ONLY: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ga-consensus-editor/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ga-consensus-editor/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
